name: Release APK

# You stay in control of releases: create the GitHub Release yourself and
# write the description/notes. When you PUBLISH it, this workflow builds the
# signed release APK from that release's tag and attaches it to the release.
# It never edits your title or description — it only uploads the APK.
on:
  release:
    types: [published]

# Needed so the GITHUB_TOKEN can upload the APK asset to the release.
permissions:
  contents: write

# If the same release is (re)published, supersede an in-flight build.
concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and attach signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          # Build exactly the code the release points at.
          ref: ${{ github.event.release.tag_name }}

      - name: Resolve version from tag
        id: ver
        run: |
          tag="${{ github.event.release.tag_name }}"
          # Strip a leading "v" so v6.2.0 -> versionName 6.2.0.
          echo "version_name=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "Building version ${tag#v} from tag $tag"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Android SDK
        # Pin command-line tools to 9.0 — newer cmdline-tools (11.0+) require
        # JDK 17, but Gradle 6.1.1 / AGP 4.0.1 need JDK 11, so the SDK tooling
        # and Gradle must share JDK 11.
        uses: android-actions/setup-android@v3
        with:
          # 9477386 == command-line tools 9.0, the last release that runs on
          # JDK 11 (11.0+ require JDK 17). Value is the build number, not "9.0".
          cmdline-tools-version: '9477386'
          packages: 'platform-tools platforms;android-29 build-tools;29.0.3'
        env:
          SKIP_JDK_VERSION_CHECK: 'true'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Refresh bundled sqlite3 binary
        run: bash scripts/update-sqlite3.sh

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Assemble release APK
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          VERSION_NAME: ${{ steps.ver.outputs.version_name }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleRelease

      - name: Attach APK to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh release upload only adds assets; it does not touch the notes.
          # --clobber lets a re-run replace an already-uploaded APK.
          gh release upload "${{ github.event.release.tag_name }}" \
            app/build/outputs/apk/release/*.apk \
            --clobber --repo "${{ github.repository }}"
