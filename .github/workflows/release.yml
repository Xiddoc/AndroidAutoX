name: Release APK

# Manual release: from the Actions tab, open "Release APK" -> "Run workflow".
# Leave the version blank to auto-bump the minor from the latest release
# (v6.1.0 -> 6.2.0), or type a specific version. CI builds the signed APK
# and creates a DRAFT release with it attached. You then open the draft,
# write your title/description, and hit "Publish release".
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v (blank = auto-bump minor from latest release)"
        required: false
        type: string

# Needed so the GITHUB_TOKEN can create the draft release and upload the APK.
permissions:
  contents: write

concurrency:
  group: release-draft
  cancel-in-progress: false

jobs:
  release:
    name: Build signed APK and create draft release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so we can compute the next version.
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          input="${{ github.event.inputs.version }}"
          if [ -n "$input" ]; then
            next="${input#v}"
            echo "Using requested version: $next"
          else
            # Highest existing vX.Y.Z tag, else fall back to baseVersionName.
            latest_tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
            if [ -z "$latest_tag" ]; then
              base=$(grep -oE "baseVersionName = '[0-9.]+'" app/build.gradle | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
            else
              base=${latest_tag#v}
            fi
            major=$(echo "$base" | cut -d. -f1)
            minor=$(echo "$base" | cut -d. -f2)
            next="${major}.$((minor + 1)).0"
            echo "Latest tag: ${latest_tag:-none} | base: $base | auto-bumped to: $next"
          fi
          echo "version_name=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Android SDK
        # Pin command-line tools to 9.0 — newer cmdline-tools (11.0+) require
        # JDK 17, but Gradle 6.1.1 / AGP 4.0.1 need JDK 11, so the SDK tooling
        # and Gradle must share JDK 11.
        uses: android-actions/setup-android@v3
        with:
          # 9477386 == command-line tools 9.0, the last release that runs on
          # JDK 11 (11.0+ require JDK 17). Value is the build number, not "9.0".
          cmdline-tools-version: '9477386'
          packages: 'platform-tools platforms;android-29 build-tools;29.0.3'
        env:
          SKIP_JDK_VERSION_CHECK: 'true'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Refresh bundled sqlite3 binary
        run: bash scripts/update-sqlite3.sh

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Assemble release APK
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          VERSION_NAME: ${{ steps.ver.outputs.version_name }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleRelease

      - name: Create draft release with the APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          # The tag is created from this commit when you publish the draft.
          target_commitish: ${{ github.sha }}
          name: Version ${{ steps.ver.outputs.version_name }}
          draft: true
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
