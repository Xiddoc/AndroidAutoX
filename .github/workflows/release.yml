name: Release APK

# You stay in control of releases. Create a *draft* release on GitHub,
# pick the tag (e.g. v6.2.0) and write your title/description. Saving the
# draft fires this workflow, which builds the signed release APK and
# attaches it to the draft. You then review and hit "Publish release" with
# the APK already in place. It never edits your title or notes.
#
# Note: a draft's git tag is not created until you publish, so this builds
# from the release's target branch (target_commitish) and uploads the APK
# to the draft by its release id rather than by tag.
on:
  release:
    types: [created]

# Needed so the GITHUB_TOKEN can upload the APK asset to the release.
permissions:
  contents: write

# If the same draft is re-saved, supersede an in-flight build.
concurrency:
  group: release-${{ github.event.release.id }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and attach signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the release target
        uses: actions/checkout@v4
        with:
          # A draft has no tag yet, so build from the branch/commit the
          # release targets (defaults to the repo's default branch).
          ref: ${{ github.event.release.target_commitish }}

      - name: Resolve version from tag
        id: ver
        run: |
          tag="${{ github.event.release.tag_name }}"
          # Strip a leading "v" so v6.2.0 -> versionName 6.2.0.
          echo "version_name=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "Building version ${tag#v} for draft release ${{ github.event.release.id }}"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Android SDK
        # Pin command-line tools to 9.0 — newer cmdline-tools (11.0+) require
        # JDK 17, but Gradle 6.1.1 / AGP 4.0.1 need JDK 11, so the SDK tooling
        # and Gradle must share JDK 11.
        uses: android-actions/setup-android@v3
        with:
          # 9477386 == command-line tools 9.0, the last release that runs on
          # JDK 11 (11.0+ require JDK 17). Value is the build number, not "9.0".
          cmdline-tools-version: '9477386'
          packages: 'platform-tools platforms;android-29 build-tools;29.0.3'
        env:
          SKIP_JDK_VERSION_CHECK: 'true'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Refresh bundled sqlite3 binary
        run: bash scripts/update-sqlite3.sh

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Assemble release APK
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          VERSION_NAME: ${{ steps.ver.outputs.version_name }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleRelease

      - name: Attach APK to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apk=$(ls app/build/outputs/apk/release/*.apk | head -n1)
          name=$(basename "$apk")
          echo "Uploading $name to release id ${{ github.event.release.id }}"
          # Drafts can't be addressed by tag (no tag exists yet), so upload to
          # the release id. Remove an existing same-named asset first so a
          # re-run doesn't 422.
          asset_id=$(gh api "/repos/${{ github.repository }}/releases/${{ github.event.release.id }}/assets" \
            --jq ".[] | select(.name == \"$name\") | .id" | head -n1)
          if [ -n "$asset_id" ]; then
            echo "Replacing existing asset $asset_id"
            gh api --method DELETE "/repos/${{ github.repository }}/releases/assets/$asset_id"
          fi
          upload_url="${{ github.event.release.upload_url }}"
          upload_url="${upload_url%\{*}?name=$name"
          curl -sSf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"$apk" \
            "$upload_url"
          echo "Done."
