name: Build

on:
  push:
    branches:
      - main
      - master
      - claude/app-refactor-ci-setup-bLSpb
  pull_request:

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Android SDK
        # Pin command-line tools to 9.0 — newer cmdline-tools (11.0+) require
        # JDK 17, but Gradle 6.1.1 / AGP 4.0.1 need JDK 11, so the SDK tooling
        # and Gradle must share JDK 11.
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '9.0'
        env:
          SKIP_JDK_VERSION_CHECK: 'true'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Refresh bundled sqlite3 binary
        run: bash scripts/update-sqlite3.sh

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
